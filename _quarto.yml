project:
  type: book
  execute-dir: project
  output-dir: _book

book:
  title: "Machine Learning Portfolio"
  subtitle: "Statistical Modeling & Machine Learning Projects in R and Python"
  author: "Arihaan Barua"
  date: today
  search: true
  site-url: https://arihaanbarua.github.io/machine-learning-portfolio/
  repo-url: https://github.com/arihaanbarua/machine-learning-portfolio
  repo-actions: [source]
  sidebar:
    style: docked
    collapse-level: 1
  chapters:
    - index.qmd
    - part: "Data Analysis & Regression (R)"
      chapters:
        - chapters/01-data-wrangling.qmd
        - chapters/02-linear-regression.qmd
        - chapters/03-regularization-knn.qmd
    - part: "Machine Learning (Python)"
      chapters:
        - chapters/04-naive-bayes.qmd
        - chapters/05-neural-network.qmd
        - chapters/06-random-forest.qmd
        - chapters/07-roc-kfold.qmd
        - chapters/08-decision-trees.qmd

format:
  html:
    theme:
      - cosmo
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    code-overflow: wrap
    fig-align: center

execute:
  freeze: auto
  warning: false
  message: false
  echo: true
